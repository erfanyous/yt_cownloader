name: YouTube Channel Downloader

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: 'آدرس کامل کانال یوتیوب (مثال: https://www.youtube.com/@ChannelName)'
        required: true
        type: string
      video_quality:
        description: 'حداکثر کیفیت مورد نظر را انتخاب کنید'
        required: true
        type: choice
        default: '1080p'
        options:
          - '2160p (4K)'
          - '1440p (2K)'
          - '1080p'
          - '720p'
          - '480p'
          - '360p'
          - 'best (بدون محدودیت کیفیت)'
          - 'bestaudio (فقط صدا)'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # رفع هشدار Node.js 20

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg aria2 p7zip-full

      - name: Install latest yt-dlp via pip
        run: pip install --upgrade yt-dlp

      - name: Debug inputs
        run: |
          echo "Channel URL      : ${{ github.event.inputs.channel_url }}"
          echo "Selected Quality : ${{ github.event.inputs.video_quality }}"

      - name: Map quality to yt-dlp format string
        id: quality
        run: |
          case "${{ github.event.inputs.video_quality }}" in
            "best (بدون محدودیت کیفیت)")   FORMAT="bestvideo+bestaudio/best" ;;
            "2160p (4K)")                    FORMAT="bestvideo[height<=2160]+bestaudio/bestvideo+bestaudio/best" ;;
            "1440p (2K)")                    FORMAT="bestvideo[height<=1440]+bestaudio/bestvideo+bestaudio/best" ;;
            "1080p")                         FORMAT="bestvideo[height<=1080]+bestaudio/bestvideo+bestaudio/best" ;;
            "720p")                          FORMAT="bestvideo[height<=720]+bestaudio/bestvideo+bestaudio/best" ;;
            "480p")                          FORMAT="bestvideo[height<=480]+bestaudio/bestvideo+bestaudio/best" ;;
            "360p")                          FORMAT="bestvideo[height<=360]+bestaudio/bestvideo+bestaudio/best" ;;
            "bestaudio (فقط صدا)")           FORMAT="bestaudio/best" ;;
            *)                               FORMAT="bestvideo+bestaudio/best" ;;
          esac
          echo "Using yt-dlp format: $FORMAT"
          echo "selected_format=$FORMAT" >> $GITHUB_OUTPUT

      - name: Download all videos from channel
        id: download
        run: |
          mkdir -p channel_videos
          yt-dlp \
            --verbose \
            --output "channel_videos/%(uploader)s/%(playlist_title|No Playlist)s/%(playlist_index& |)s%(title)s.%(ext)s" \
            --format "${{ steps.quality.outputs.selected_format }}" \
            --merge-output-format mp4 \
            --yes-playlist \
            --ignore-errors \
            --no-overwrites \
            --continue \
            --extract-archive downloaded.txt \
            --download-archive downloaded.txt \
            --external-downloader aria2c \
            --external-downloader-args "-x 16 -s 16 -k 2M" \
            "${{ github.event.inputs.channel_url }}" 2>&1 | tee yt-dlp.log
          # بررسی اینکه آیا ویدیویی دانلود شده است
          if [ ! "$(ls -A channel_videos 2>/dev/null)" ]; then
            echo "ERROR: No videos were downloaded. Please check the yt-dlp output above."
            exit 1
          fi

      - name: Show yt-dlp log in case of previous failure
        if: failure()
        run: cat yt-dlp.log

      - name: Compress and split archive
        if: success()
        run: |
          MAX_SIZE_MB=2048
          cd channel_videos
          zip -r "../youtube-channel-videos.zip" .
          cd ..
          FILE_SIZE=$(stat -c%s "youtube-channel-videos.zip")
          MAX_SIZE_BYTES=$((MAX_SIZE_MB * 1024 * 1024))
          echo "Archive size: $((FILE_SIZE / 1024 / 1024)) MB"
          if [ $FILE_SIZE -gt $MAX_SIZE_BYTES ]; then
            echo "Splitting into ${MAX_SIZE_MB}MB parts..."
            split -b ${MAX_SIZE_MB}M "youtube-channel-videos.zip" "youtube-channel-videos.zip.part"
            rm -f "youtube-channel-videos.zip"
          else
            mv "youtube-channel-videos.zip" "youtube-channel-videos.zip.parta"
          fi
          ls -lah youtube-channel-videos.zip.part*

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-channel-videos
          path: youtube-channel-videos.zip.part*
          compression-level: 0
          retention-days: 7
