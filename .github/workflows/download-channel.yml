name: YouTube Channel Downloader

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: 'آدرس کامل کانال یوتیوب (مثلاً https://www.youtube.com/@channelname)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup yt-dlp and FFmpeg
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ffmpeg: true
          aria2: true
          ejs-node: true

      - name: Create Download Directory
        run: mkdir -p channel_videos

      - name: Download Channel Videos
        # [IMPORTANT] دستور yt-dlp بازنویسی شده بدون علامت نقل قول اضافی
        run: |
          yt-dlp \
            --verbose \
            --output "channel_videos/%(title)s.%(ext)s" \
            --format "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --merge-output-format mp4 \
            --yes-playlist \
            --ignore-errors \
            --no-overwrites \
            --continue \
            --extract-archive downloaded.txt \
            --download-archive downloaded.txt \
            --external-downloader aria2c \
            --external-downloader-args "-x 16 -s 16 -k 2M" \
            ${{ github.event.inputs.channel_url }}

      - name: List Downloaded Files
        run: ls -la channel_videos/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-channel-videos
          path: channel_videos/
          compression-level: 9
          retention-days: 7
