name: YouTube Channel Downloader

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: 'آدرس دقیق کانال یوتیوب (مثل https://www.youtube.com/@Google)'
        required: true
        type: string
      video_quality:
        description: 'حداکثر کیفیت دلخواه'
        required: true
        type: choice
        default: '1080p'
        options:
          - '2160p (4K)'
          - '1440p (2K)'
          - '1080p'
          - '720p'
          - '480p'
          - '360p'
          - 'best (بهترین کیفیت)'

env:
  # حذف اخطار قدیمی بودن Node.js 20 و استفاده از نسخه 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download-channel:
    runs-on: ubuntu-latest
    permissions:
      contents: write # برای ذخیره فایل‌ها در ریپازیتوری

    steps:
      - name: دریافت کدها
        uses: actions/checkout@v4

      - name: نصب پیش‌نیازهای سیستمی
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg aria2 p7zip-full curl jq python3-pip

      # ★ گام اول حل مشکل اصلی: نصب Deno و yt-dlp به روش اصولی
      - name: نصب Deno و yt-dlp به همراه افزونه‌های ضروری
        run: |
          # 1. نصب Deno (موتور جاوااسکریپت برای عبور از قفل n-challenge)
          curl -fsSL https://deno.land/install.sh | DENO_INSTALL=/usr/local sh
          # 2. نصب yt-dlp با pip (که شامل فایل‌های EJS برای حل چالش است)
          pip3 install --break-system-packages "yt-dlp[default]" yt-dlp-ejs
          # 3. فقط برای اطمینان
          echo "نسخه Deno: $(deno --version)"
          echo "نسخه yt-dlp: $(yt-dlp --version)"

      # ★ گام دوم حل مشکل: استفاده از API و ساختاربندی دقیق پوشه‌ها
      - name: استخراج، تبدیل و دانلود کل ویدیوهای کانال
        run: |
          python3 << 'PYEOF'
          import os, sys, json, time, re, subprocess, shutil
          import requests

          # ========== 1. دریافت اطلاعات ورودی از کاربر ==========
          CHANNEL_URL = "${{ github.event.inputs.channel_url }}"
          QUALITY_MAP = {
              "best (بهترین کیفیت)": "1080p",
              "2160p (4K)": "2160p",
              "1440p (2K)": "1440p",
              "1080p": "1080p",
              "720p": "720p",
              "480p": "480p",
              "360p": "360p"
          }
          SELECTED_QUALITY = "${{ github.event.inputs.video_quality }}"
          TARGET_QUALITY = QUALITY_MAP.get(SELECTED_QUALITY, "720p")
          
          # ========== 2. استخراج لیست ویدیوها با yt-dlp ==========
          print(">> در حال دریافت لیست ویدیوهای کانال...")
          # استفاده از flat-playlist برای سرعت و جلوگیری از دانلود ناخواسته
          cmd = [
              "yt-dlp",
              "--flat-playlist",
              "--dump-json",
              CHANNEL_URL
          ]
          try:
              result = subprocess.run(cmd, capture_output=True, text=True, check=True)
              videos = [json.loads(line) for line in result.stdout.splitlines() if line.strip()]
              print(f">> {len(videos)} ویدیو پیدا شد.")
          except Exception as e:
              print(f"خطا در دریافت لیست ویدیوها: {e}")
              sys.exit(1)

          if not videos:
              print("هیچ ویدیویی پیدا نشد.")
              sys.exit(0)

          # ========== 3. حلقه اصلی: تبدیل و دانلود هر ویدیو ==========
          # آماده‌سازی پوشه‌ها
          BASE_DIR = "channel_videos"
          os.makedirs(BASE_DIR, exist_ok=True)
          
          # هدرهای معتبر برای جا زدن خود بعنوان مرورگر (الگوبرداری از erfanyous)
          HEADERS = {
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64; rv:140.0) Gecko/20100101 Firefox/140.0",
              "Accept": "application/json",
              "Referer": "https://media.ytmp3.gg/",
              "Content-Type": "application/json",
              "Origin": "https://media.ytmp3.gg"
          }
          API_ENDPOINT = "https://hub.ytconvert.org/api/download"

          for idx, video in enumerate(videos):
              video_url = video.get('url')
              if not video_url:
                  continue
              video_id = video.get('id', f"unknown_{idx}")
              title = video.get('title', f"video_{idx}").replace('/', '_').replace(':', '_')[:60]
              
              # تعیین پوشه مقصد بر اساس پلی‌لیست یا بدون پلی‌لیست
              playlist_title = video.get('playlist_title', 'No Playlist').replace('/', '_')
              if not playlist_title or playlist_title == 'NA':
                  playlist_title = "No Playlist"
              
              # ساخت مسیر نهایی
              target_dir = os.path.join(BASE_DIR, playlist_title)
              os.makedirs(target_dir, exist_ok=True)
              
              # نام فایل خروجی
              safe_title = re.sub(r'[^a-zA-Z0-9\-_\.]', '_', title)
              filename = f"{safe_title}_{video_id}_{TARGET_QUALITY}.mp4"
              filepath = os.path.join(target_dir, filename)

              # اگر فایل از قبل وجود داشت، رد می‌کنیم
              if os.path.exists(filepath):
                  print(f"[{idx+1}/{len(videos)}] ✓ از قبل موجود بود: {title}")
                  continue

              print(f"[{idx+1}/{len(videos)}] در حال درخواست تبدیل: {title}")
              
              # مرحله اول: درخواست تبدیل به API
              payload = {
                  "url": video_url,
                  "os": "linux",
                  "output": {"type": "video", "format": "mp4", "quality": TARGET_QUALITY}
              }

              try:
                  response = requests.post(API_ENDPOINT, json=payload, headers=HEADERS, timeout=30)
                  response.raise_for_status()
                  data = response.json()
                  status_url = data.get('statusUrl')
                  if not status_url:
                      print(f"  ⚠️ API پاسخی نداد. رد شد.")
                      continue

                  # مرحله دوم: انتظار برای تکمیل تبدیل (حداکثر 90 ثانیه)
                  download_url = None
                  for attempt in range(45): # 45 * 2s = 90s
                      time.sleep(2)
                      status_resp = requests.get(status_url, headers=HEADERS, timeout=15)
                      status_data = status_resp.json()
                      if status_data.get('status') == 'completed':
                          download_url = status_data.get('downloadUrl')
                          break
                      elif status_data.get('status') == 'failed':
                          print(f"  ❌ تبدیل ناموفق بود.")
                          break
                  
                  if not download_url:
                      print(f"  ⏱️ زمان انتظار به پایان رسید.")
                      continue

                  # مرحله سوم: دانلود فایل نهایی
                  print(f"  ⬇️ در حال دانلود...")
                  dl_response = requests.get(download_url, headers=HEADERS, stream=True, timeout=300)
                  with open(filepath, 'wb') as f:
                      for chunk in dl_response.iter_content(chunk_size=8192):
                          f.write(chunk)
                  print(f"  ✅ با موفقیت دانلود شد: {filename}")

              except Exception as e:
                  print(f"  🔥 خطای غیرمنتظره: {e}")
                  continue

          print("دانلود همه ویدیوها به پایان رسید.")
          PYEOF
        shell: bash

      - name: بسته‌بندی و تقسیم فایل‌ها
        run: |
          MAX_SIZE_MB=2048
          cd channel_videos
          zip -r "../youtube-channel-videos.zip" .
          cd ..
          FILE_SIZE=$(stat -c%s "youtube-channel-videos.zip")
          MAX_SIZE_BYTES=$((MAX_SIZE_MB * 1024 * 1024))
          echo "حجم کل فایل: $((FILE_SIZE / 1024 / 1024)) مگابایت"
          if [ $FILE_SIZE -gt $MAX_SIZE_BYTES ]; then
            echo "فایل حجیم است. در حال تقسیم به بخش‌های ${MAX_SIZE_MB}MB..."
            split -b ${MAX_SIZE_MB}M "youtube-channel-videos.zip" "youtube-channel-videos.zip.part"
            rm -f "youtube-channel-videos.zip"
          else
            mv "youtube-channel-videos.zip" "youtube-channel-videos.zip.parta"
          fi
          ls -lah youtube-channel-videos.zip.part*

      - name: آپلود فایل‌های نهایی در ریپازیتوری
        uses: actions/upload-artifact@v4
        with:
          name: youtube-channel-videos
          path: youtube-channel-videos.zip.part*
          compression-level: 0
          retention-days: 7
