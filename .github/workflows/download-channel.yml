name: YouTube Smart Downloader

# ورودی‌های جدید و مهندسی‌شده
on:
  workflow_dispatch:
    inputs:
      download_mode:
        description: 'چه چیزی را می‌خواهید دانلود کنید؟'
        required: true
        type: choice
        default: 'کانال کامل'
        options:
          - 'کانال کامل'
          - 'پلی لیست خاص'
      target_url:
        description: 'آدرس کانال یا پلی‌لیست یوتیوب'
        required: true
        type: string
      video_quality:
        description: 'حداکثر کیفیت دلخواه'
        required: true
        type: choice
        default: '1080p'
        options:
          - '2160p (4K)'
          - '1440p (2K)'
          - '1080p'
          - '720p'
          - '480p'
          - '360p'
          - 'best (بهترین کیفیت)'

# رفع هشدار Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smart-download:
    runs-on: ubuntu-latest
    # مجوز نوشتن روی مخزن برای commit کردن فایل‌ها
    permissions:
      contents: write

    steps:
      # 1. دریافت سورس مخزن
      - name: دریافت کدهای مخزن
        uses: actions/checkout@v4
        with:
          # این گزینه برای commit کردن در ادامه‌ی کار ضروری است
          persist-credentials: true

      # 2. نصب ابزارهای کلیدی با روش اصولی
      - name: نصب Deno و yt-dlp به همراه وابستگی‌های ضروری
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg aria2 curl
          # نصب Deno برای حل چالش‌های جاوااسکریپت یوتیوب
          curl -fsSL https://deno.land/install.sh | DENO_INSTALL=/usr/local sh
          # نصب yt-dlp با تمام افزونه‌ها (مهم: yt-dlp-ejs)
          pip install --break-system-packages "yt-dlp[default]" yt-dlp-ejs

      # 3. تبدیل انتخاب کاربر به فرمت فنی yt-dlp
      - name: ساخت فرمت yt-dlp و پرچم‌های لازم
        id: config
        run: |
          # تبدیل کیفیت
          case "${{ github.event.inputs.video_quality }}" in
            "best (بهترین کیفیت)") FORMAT="bestvideo+bestaudio/best" ;;
            "2160p (4K)")  FORMAT="bestvideo[height<=2160]+bestaudio/bestvideo+bestaudio/best" ;;
            "1440p (2K)")  FORMAT="bestvideo[height<=1440]+bestaudio/bestvideo+bestaudio/best" ;;
            "1080p")       FORMAT="bestvideo[height<=1080]+bestaudio/bestvideo+bestaudio/best" ;;
            "720p")        FORMAT="bestvideo[height<=720]+bestaudio/bestvideo+bestaudio/best" ;;
            "480p")        FORMAT="bestvideo[height<=480]+bestaudio/bestvideo+bestaudio/best" ;;
            "360p")        FORMAT="bestvideo[height<=360]+bestaudio/bestvideo+bestaudio/best" ;;
            *)             FORMAT="bestvideo[height<=1080]+bestaudio/bestvideo+bestaudio/best" ;;
          esac
          echo "selected_format=$FORMAT" >> $GITHUB_OUTPUT

          # تنظیم پرچم‌های دانلود بر اساس انتخاب کاربر
          if [ "${{ github.event.inputs.download_mode }}" == "کانال کامل" ]; then
            echo "extra_flags=--yes-playlist --playlist-reverse" >> $GITHUB_OUTPUT
            echo "output_template=channel_videos/%(uploader)s/%(playlist_title|No_Playlist)s/%(playlist_index& |)s%(title)s.%(ext)s" >> $GITHUB_OUTPUT
          else
            echo "extra_flags=--yes-playlist --playlist-random" >> $GITHUB_OUTPUT
            echo "output_template=channel_videos/%(playlist_title)s/%(playlist_index)s - %(title)s.%(ext)s" >> $GITHUB_OUTPUT
          fi

      # 4. دانلود هوشمند با مدیریت خطا
      - name: دانلود ویدیوها و سازماندهی در پوشه‌ها
        id: download
        run: |
          mkdir -p channel_videos
          echo ">> شروع دانلود از: ${{ github.event.inputs.target_url }}"
          
          # اجرای yt-dlp با تنظیمات بهینه و عبور از تحریم‌ها
          yt-dlp \
            --verbose \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --extractor-args "youtube:player_client=web" \
            --output "${{ steps.config.outputs.output_template }}" \
            --format "${{ steps.config.outputs.selected_format }}" \
            --merge-output-format mp4 \
            ${{ steps.config.outputs.extra_flags }} \
            --ignore-errors \
            --no-overwrites \
            --continue \
            --download-archive downloaded.txt \
            --external-downloader aria2c \
            --external-downloader-args "-x 16 -s 16 -k 2M" \
            "${{ github.event.inputs.target_url }}" 2>&1 | tee yt-dlp.log

          # بررسی منطقی بودن خروجی
          if [ ! "$(ls -A channel_videos 2>/dev/null)" ]; then
            echo "خطا: هیچ ویدیویی دانلود نشد. لاگ نهایی:"
            tail -n 30 yt-dlp.log
            exit 1
          fi
          echo ">> دانلود موفقیت‌آمیز بود."

      # 5. مرحله طلایی: ذخیره فایل‌ها در خود مخزن گیت (Commit & Push)
      - name: ذخیره مستقیم ویدیوها در مخزن گیت‌هاب
        if: success()
        run: |
          # حذف تمام فایل‌های موقتی و نگه داشتن فقط ویدیوها
          rm -f yt-dlp.log downloaded.txt
          
          # بررسی اندازه فایل‌ها و هشدار در صورت عبور از محدودیت گیت‌هاب
          echo "--- بررسی اندازه فایل‌ها ---"
          find channel_videos -type f -size +50M -exec echo "هشدار: {} بزرگتر از 50MB است" \;
          
          # تنظیمات Git برای کاربر اکانت
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # اضافه کردن و commit کردن تمام تغییرات
          git add channel_videos/ downloaded.txt
          
          # اگر تغییری ایجاد نشده بود، کار را متوقف نکن
          if git diff --cached --quiet; then
            echo "هیچ فایل جدیدی برای commit وجود ندارد."
            exit 0
          fi
          
          git commit -m "دانلود خودکار ویدیوهای جدید از ${{ github.event.inputs.target_url }}"
          git push
