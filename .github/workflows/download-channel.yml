name: YouTube Channel Downloader

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: 'آدرس دقیق کانال یوتیوب (مثل https://www.youtube.com/@Google)'
        required: true
        type: string
      video_quality:
        description: 'حداکثر کیفیت دلخواه'
        required: true
        type: choice
        default: '1080p'
        options:
          - '2160p (4K)'
          - '1440p (2K)'
          - '1080p'
          - '720p'
          - '480p'
          - '360p'
          - 'best (بهترین کیفیت)'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg aria2 python3-pip curl jq

      - name: Install Deno and latest yt-dlp with EJS support
        run: |
          curl -fsSL https://deno.land/install.sh | DENO_INSTALL=/usr/local sh
          pip3 install --break-system-packages "yt-dlp[default]" yt-dlp-ejs
          echo "Deno: $(deno --version)"
          echo "yt-dlp: $(yt-dlp --version)"

      - name: Download all channel videos via API
        run: |
          python3 << 'PYEOF'
          import os, sys, json, time, re, subprocess
          import requests

          CHANNEL_URL = "${{ github.event.inputs.channel_url }}"
          QUALITY_MAP = {
              "best (بهترین کیفیت)": "1080p",
              "2160p (4K)": "2160p",
              "1440p (2K)": "1440p",
              "1080p": "1080p",
              "720p": "720p",
              "480p": "480p",
              "360p": "360p"
          }
          TARGET_QUALITY = QUALITY_MAP.get("${{ github.event.inputs.video_quality }}", "720p")

          BASE_DIR = "downloads"
          os.makedirs(BASE_DIR, exist_ok=True)

          print(">> دریافت لیست ویدیوهای کانال...")
          cmd = ["yt-dlp", "--flat-playlist", "--dump-json", CHANNEL_URL]
          try:
              result = subprocess.run(cmd, capture_output=True, text=True, check=True)
              videos = [json.loads(line) for line in result.stdout.splitlines() if line.strip()]
              print(f">> {len(videos)} ویدیو پیدا شد.")
          except Exception as e:
              print(f"خطای دریافت لیست: {e}")
              sys.exit(1)

          if not videos:
              print("هیچ ویدیویی یافت نشد.")
              sys.exit(0)

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64; rv:140.0) Gecko/20100101 Firefox/140.0",
              "Accept": "application/json",
              "Referer": "https://media.ytmp3.gg/",
              "Content-Type": "application/json",
              "Origin": "https://media.ytmp3.gg"
          }
          API_ENDPOINT = "https://hub.ytconvert.org/api/download"

          for idx, video in enumerate(videos):
              video_url = video.get('url')
              if not video_url:
                  continue
              video_id = video.get('id', f"unknown_{idx}")
              title = video.get('title', f"video_{idx}").replace('/', '_').replace(':', '_')[:60]
              playlist = video.get('playlist_title', 'No Playlist').replace('/', '_')
              if not playlist or playlist == 'NA':
                  playlist = "No Playlist"

              target_dir = os.path.join(BASE_DIR, playlist)
              os.makedirs(target_dir, exist_ok=True)

              safe_title = re.sub(r'[^a-zA-Z0-9\-_\.]', '_', title)
              filename = f"{safe_title}_{video_id}_{TARGET_QUALITY}.mp4"
              filepath = os.path.join(target_dir, filename)

              if os.path.exists(filepath):
                  print(f"[{idx+1}/{len(videos)}] ✓ قبلاً موجود: {title}")
                  continue

              print(f"[{idx+1}/{len(videos)}] درخواست تبدیل: {title}")
              payload = {
                  "url": video_url,
                  "os": "linux",
                  "output": {"type": "video", "format": "mp4", "quality": TARGET_QUALITY}
              }

              try:
                  resp = requests.post(API_ENDPOINT, json=payload, headers=HEADERS, timeout=30)
                  resp.raise_for_status()
                  data = resp.json()
                  status_url = data.get('statusUrl')
                  if not status_url:
                      print("  ⚠️ پاسخ API ناقص، رد شد.")
                      continue

                  download_url = None
                  for _ in range(60):
                      time.sleep(2)
                      sres = requests.get(status_url, headers=HEADERS, timeout=15)
                      sdata = sres.json()
                      if sdata.get('status') == 'completed':
                          download_url = sdata.get('downloadUrl')
                          break
                      elif sdata.get('status') == 'failed':
                          print("  ❌ تبدیل ناموفق.")
                          break

                  if not download_url:
                      print("  ⏱️ مهلت انتظار تمام شد.")
                      continue

                  print("  ⬇️ در حال دانلود...")
                  dl_resp = requests.get(download_url, headers=HEADERS, stream=True, timeout=300)
                  with open(filepath, 'wb') as f:
                      for chunk in dl_resp.iter_content(chunk_size=8192):
                          f.write(chunk)
                  print(f"  ✅ ذخیره شد: {filename}")

              except Exception as e:
                  print(f"  🔥 خطا: {e}")
                  continue

          print("پایان دانلود تمام ویدیوها.")
          PYEOF
        shell: bash

      - name: Split large MP4s into GitHub-friendly chunks (≤ 95MB)
        run: |
          echo ">> بررسی و تقسیم فایل‌های بزرگ‌تر از 95 مگابایت..."
          find downloads -type f -name "*.mp4" -size +95M | while read file; do
            echo "تقسیم: $file"
            split -b 95M -d "$file" "${file}.part"
            rm "$file"
            echo "فایل اصلی حذف و بخش‌ها ایجاد شدند."
          done
          echo "لیست فایل‌ها در downloads:"
          find downloads -type f | sort

      - name: Commit and push videos to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/

          # ★ کلید حل مشکل: فقط در صورت وجود تغییرات commit کن
          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "Add downloaded videos from ${{ github.event.inputs.channel_url }}"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "هیچ فایل جدیدی برای commit وجود ندارد."
          fi
        shell: bash

      - name: Show final tree structure
        run: |
          echo "========== ساختار پوشه downloads =========="
          find downloads -type f | head -n 50
          echo "تعداد فایل‌ها: $(find downloads -type f | wc -l)"
