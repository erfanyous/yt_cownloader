name: YouTube Channel Downloader (Commit Version)

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: 'آدرس کامل کانال یوتیوب (مثال: https://www.youtube.com/@ChannelName)'
        required: true
        type: string
      video_quality:
        description: 'حداکثر کیفیت مورد نظر را انتخاب کنید'
        required: true
        type: choice
        default: '1080p'
        options:
          - '2160p (4K)'
          - '1440p (2K)'
          - '1080p'
          - '720p'
          - '480p'
          - '360p'
          - 'best (بدون محدودیت کیفیت)'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ضروری برای push کردن کامیت‌ها

    steps:
      # مرحله ۱: دریافت کدهای ریپازیتوری
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }} # مهم: branch فعلی را نگه می‌دارد

      # مرحله ۲: نصب ابزارهای سیستمی
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg aria2 p7zip-full

      # ★ مرحله کلیدی ۳: نصب Deno (موتور جاوااسکریپت ضروری برای یوتیوب)
      - name: Install deno (JavaScript runtime for yt-dlp)
        run: |
          curl -fsSL https://deno.land/install.sh | sh -s -- -y
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      # ★ مرحله کلیدی ۴: نصب آخرین نسخه شبانه yt-dlp + بسته EJS
      - name: Install latest yt-dlp with EJS support
        run: |
          # نصب yt-dlp از GitHub Releases
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          # نصب بسته yt-dlp-ejs برای حل چالش‌های جاوااسکریپت یوتیوب
          pip install --upgrade yt-dlp-ejs

      # مرحله ۵: نمایش اطلاعات ورودی برای عیب‌یابی
      - name: Debug inputs
        run: |
          echo "Channel URL      : ${{ github.event.inputs.channel_url }}"
          echo "Selected Quality : ${{ github.event.inputs.video_quality }}"

      # مرحله ۶: تبدیل کیفیت انتخابی به فرمت قابل فهم برای yt-dlp
      - name: Map quality to yt-dlp format string
        id: quality
        run: |
          case "${{ github.event.inputs.video_quality }}" in
            "best (بدون محدودیت کیفیت)")   FORMAT="bestvideo+bestaudio/best" ;;
            "2160p (4K)")                    FORMAT="bestvideo[height<=2160]+bestaudio/bestvideo+bestaudio/best" ;;
            "1440p (2K)")                    FORMAT="bestvideo[height<=1440]+bestaudio/bestvideo+bestaudio/best" ;;
            "1080p")                         FORMAT="bestvideo[height<=1080]+bestaudio/bestvideo+bestaudio/best" ;;
            "720p")                          FORMAT="bestvideo[height<=720]+bestaudio/bestvideo+bestaudio/best" ;;
            "480p")                          FORMAT="bestvideo[height<=480]+bestaudio/bestvideo+bestaudio/best" ;;
            "360p")                          FORMAT="bestvideo[height<=360]+bestaudio/bestvideo+bestaudio/best" ;;
            *)                               FORMAT="bestvideo+bestaudio/best" ;;
          esac
          echo "Using yt-dlp format: $FORMAT"
          echo "selected_format=$FORMAT" >> $GITHUB_OUTPUT
        shell: bash

      # ★ مرحله ۷: تست اولیه برای اطمینان از دسترسی به کانال
      - name: Test channel extractor (list first 5 videos)
        run: |
          echo ">>> در حال تست استخراج اطلاعات از کانال. اگر خطایی رخ دهد، در اینجا نمایش داده می‌شود."
          yt-dlp \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --extractor-args "youtube:player_client=web" \
            --flat-playlist \
            --dump-json \
            --playlist-end 5 \
            "${{ github.event.inputs.channel_url }}" || {
              echo "❌ FAILED: استخراج اطلاعات کانال شکست خورد. لطفاً لاگ بالا را بررسی کنید."
              exit 1
            }
          echo "✅ تست استخراج با موفقیت انجام شد."

      # ★ مرحله ۸: دانلود تمام ویدیوهای کانال
      - name: Download all videos from channel
        id: download
        run: |
          mkdir -p channel_videos
          echo ">>> دانلود تمام ویدیوها با ساختار پوشه‌بندی خودکار..."
          # اجرای دانلود و ذخیره لاگ
          yt-dlp \
            --verbose \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --extractor-args "youtube:player_client=web" \
            --output "channel_videos/%(uploader)s/%(playlist_title|No_Playlist)s/%(playlist_index& |)s%(title)s.%(ext)s" \
            --format "${{ steps.quality.outputs.selected_format }}" \
            --merge-output-format mp4 \
            --yes-playlist \
            --ignore-errors \
            --no-overwrites \
            --continue \
            --extract-archive downloaded.txt \
            --download-archive downloaded.txt \
            --external-downloader aria2c \
            --external-downloader-args "-x 16 -s 16 -k 2M" \
            "${{ github.event.inputs.channel_url }}" 2>&1 | tee yt-dlp.log

          # بررسی محتوای پوشه دانلود
          if [ ! "$(ls -A channel_videos 2>/dev/null)" ]; then
            echo "❌ ERROR: هیچ ویدیویی دانلود نشد."
            echo "--- 30 خط آخر لاگ yt-dlp برای عیب‌یابی ---"
            tail -n 30 yt-dlp.log
            exit 1
          fi
          echo "✅ دانلود ویدیوها کامل شد."
        shell: bash

      # ★★★ مرحله جدید ۹: تقسیم فایل‌های حجیم به بخش‌های کوچکتر از ۱۰۰MB ★★★
      - name: Split large files into GitHub-friendly chunks (< 95MB)
        run: |
          echo ">>> در حال قطعه‌قطعه کردن فایل‌های بزرگتر از ۹۵MB..."
          
          python3 << 'PYEOF'
          import os, glob

          # پوشه‌ای که ویدیوها در آن قرار دارند
          DOWNLOAD_DIR = "channel_videos"
          # حداکثر سایز هر قطعه: ۹۵ مگابایت (برای احتیاط و فضای خالی)
          CHUNK_SIZE = 95 * 1024 * 1024  

          def split_file(filepath, chunk_size):
              """فایل را به قطعات chunk_size بایتی تقسیم می‌کند."""
              if not os.path.exists(filepath):
                  return
              fsize = os.path.getsize(filepath)
              if fsize <= chunk_size:
                  return  # نیازی به تقسیم نیست
              
              print(f"  ✂️ در حال تقسیم: {filepath} ({fsize/(1024*1024):.1f} MB)")
              base_name = os.path.basename(filepath)
              dir_name = os.path.dirname(filepath)
              
              with open(filepath, 'rb') as f:
                  chunk_num = 0
                  while True:
                      chunk = f.read(chunk_size)
                      if not chunk:
                          break
                      chunk_num += 1
                      chunk_name = f"{base_name}.part{chunk_num:04d}"
                      chunk_path = os.path.join(dir_name, chunk_name)
                      with open(chunk_path, 'wb') as cf:
                          cf.write(chunk)
                      print(f"     → {chunk_name} ({len(chunk)/(1024*1024):.1f} MB)")
              
              # حذف فایل اصلی بزرگ بعد از تقسیم موفق
              os.remove(filepath)
              print(f"     🗑️ فایل اصلی حذف شد: {base_name}")

          # پیدا کردن همه فایل‌های mp4 در پوشه دانلود
          all_files = glob.glob(os.path.join(DOWNLOAD_DIR, '**', '*.mp4'), recursive=True)
          for f in all_files:
              split_file(f, CHUNK_SIZE)

          print("✅ تقسیم فایل‌ها به پایان رسید.")
          PYEOF

      # ★★★ مرحله ۱۰: ساخت یک فایل README ساده در پوشه دانلود ★★★
      - name: Create README in download folder
        run: |
          cat > channel_videos/README.md << 'EOF'
          # 📁 ویدیوهای دانلود شده

          این پوشه حاوی ویدیوهای دانلود شده از کانال یوتیوب است.  
          فایل‌های با پسوند `.partXXXX` قطعات تشکیل‌دهنده یک ویدیو هستند.

          ## 🔧 نحوه بازیابی (Merge) ویدیوها در ویندوز
          ۱. همه قطعات یک ویدیو را در یک پوشه قرار دهید.
          ۲. یک فایل متنی با نام `merge.bat` در همان پوشه بسازید و کد زیر را داخل آن قرار دهید:
