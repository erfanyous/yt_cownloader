name: YouTube Single Video Downloader

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: 'لینک ویدیوهای یوتیوب (با کاما یا خط جدید جدا کنید)'
        required: true
        type: string
      video_quality:
        description: 'حداکثر کیفیت (یا فقط صدا)'
        required: true
        type: choice
        default: '1080p'
        options:
          - '2160p (4K)'
          - '1440p (2K)'
          - '1080p'
          - '720p'
          - '480p'
          - '360p'
          - 'best (بهترین کیفیت)'
          - 'bestaudio (فقط صدا)'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download-singles:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg aria2 python3-pip curl jq

      - name: Setup Deno and yt-dlp with EJS support
        run: |
          curl -fsSL https://deno.land/install.sh | DENO_INSTALL=/usr/local sh
          pip3 install --break-system-packages "yt-dlp[default]" yt-dlp-ejs
          echo "Deno version: $(deno --version)"
          echo "yt-dlp version: $(yt-dlp --version)"

      - name: Download each single video
        run: |
          python3 << 'PYEOF'
          import os, sys, json, time, re, subprocess
          import requests

          # گرفتن لیست لینک‌ها از ورودی (با کاما یا خط جدید جدا شده‌اند)
          raw_urls = "${{ github.event.inputs.video_urls }}"
          # تبدیل کاما و خط جدید به یک لیست
          urls = [u.strip() for u in raw_urls.replace(',', '\n').split('\n') if u.strip()]

          if not urls:
              print("هیچ لینکی وارد نشده است.")
              sys.exit(0)

          # نگاشت کیفیت به پارامترهای API
          quality_input = "${{ github.event.inputs.video_quality }}"

          # تعیین نوع خروجی (صوتی یا ویدیویی)
          if quality_input == "bestaudio (فقط صدا)":
              output_type = "audio"
              output_format = "mp3"
              output_quality = "320"  # برای صدا کیفیت ثابت
          else:
              output_type = "video"
              output_format = "mp4"
              quality_map = {
                  "best (بهترین کیفیت)": "1080p",
                  "2160p (4K)": "2160p",
                  "1440p (2K)": "1440p",
                  "1080p": "1080p",
                  "720p": "720p",
                  "480p": "480p",
                  "360p": "360p"
              }
              output_quality = quality_map.get(quality_input, "720p")

          BASE_DIR = "downloads/single_videos"
          os.makedirs(BASE_DIR, exist_ok=True)

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Accept": "application/json",
              "Referer": "https://media.ytmp3.gg/",
              "Content-Type": "application/json",
              "Origin": "https://media.ytmp3.gg"
          }
          API_ENDPOINT = "https://hub.ytconvert.org/api/download"

          for idx, url in enumerate(urls):
              print(f"\n[{idx+1}/{len(urls)}] پردازش: {url}")

              # دریافت اطلاعات ویدیو با yt-dlp برای نام‌گذاری
              try:
                  info_cmd = ["yt-dlp", "--dump-json", url]
                  res = subprocess.run(info_cmd, capture_output=True, text=True, check=True)
                  video_info = json.loads(res.stdout)
                  title = video_info.get('title', f"video_{idx}").replace('/', '_').replace(':', '_')[:60]
                  video_id = video_info.get('id', f"id_{idx}")
              except Exception as e:
                  print(f"⚠️ خطا در دریافت اطلاعات ویدیو: {e}")
                  # در صورت خطا، نام پیش‌فرض
                  title = f"video_{idx}"
                  video_id = f"id_{idx}"

              safe_title = re.sub(r'[^a-zA-Z0-9\-_\.]', '_', title)
              ext = output_format
              filename = f"{safe_title}_{video_id}_{output_quality}.{ext}"
              filepath = os.path.join(BASE_DIR, filename)

              if os.path.exists(filepath):
                  print(f"✓ از قبل موجود بود: {title}")
                  continue

              print(f"🎬 عنوان: {title}")
              print(f"🔄 درخواست تبدیل با کیفیت {output_quality}...")

              payload = {
                  "url": url,
                  "os": "linux",
                  "output": {
                      "type": output_type,
                      "format": output_format,
                      "quality": output_quality
                  }
              }

              try:
                  # ارسال درخواست تبدیل
                  resp = requests.post(API_ENDPOINT, json=payload, headers=HEADERS, timeout=30)
                  resp.raise_for_status()
                  data = resp.json()
                  status_url = data.get('statusUrl')
                  if not status_url:
                      print("  ⚠️ پاسخ API ناقص بود.")
                      continue

                  # انتظار برای تکمیل تبدیل (حداکثر ۲ دقیقه)
                  download_url = None
                  for _ in range(60):
                      time.sleep(2)
                      sres = requests.get(status_url, headers=HEADERS, timeout=15)
                      sdata = sres.json()
                      if sdata.get('status') == 'completed':
                          download_url = sdata.get('downloadUrl')
                          break
                      elif sdata.get('status') == 'failed':
                          print("  ❌ تبدیل شکست خورد.")
                          break

                  if not download_url:
                      print("  ⏱️ زمان انتظار به پایان رسید.")
                      continue

                  # دانلود فایل نهایی
                  print("  ⬇️ در حال دانلود...")
                  dl_resp = requests.get(download_url, headers=HEADERS, stream=True, timeout=300)
                  with open(filepath, 'wb') as f:
                      for chunk in dl_resp.iter_content(chunk_size=8192):
                          f.write(chunk)
                  print(f"  ✅ ذخیره شد: {filename}")

              except Exception as e:
                  print(f"  🔥 خطا: {e}")
                  continue

          print("\nپایان دانلود تمام ویدیوهای تک‌تک.")
          PYEOF
        shell: bash

      - name: Split large files (>95MB) for GitHub
        run: |
          echo ">> بررسی فایل‌های بزرگ‌تر از 95MB..."
          large_files=$(find downloads/single_videos -type f \( -name "*.mp4" -o -name "*.mp3" \) -size +95M)
          if [ -n "$large_files" ]; then
            while IFS= read -r file; do
              echo "در حال تقسیم: $file"
              split -b 95M -d "$file" "${file}.part"
              rm "$file"
              echo "فایل اصلی حذف و تکه‌ها ساخته شدند."
            done <<< "$large_files"
          else
            echo "هیچ فایل بزرگی یافت نشد."
          fi
          echo "لیست فایل‌های موجود:"
          find downloads/single_videos -type f | sort
        shell: bash

      - name: Commit and push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add downloads/single_videos/

          if git diff --cached --quiet; then
            echo "هیچ تغییری برای commit وجود ندارد."
            exit 0
          fi

          git commit -m "Add single videos"

          if ! git push origin HEAD:${{ github.ref_name }}; then
            echo "Push اولیه ناموفق بود. تلاش برای همگام‌سازی مجدد..."
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
        shell: bash

      - name: Show final directory tree
        run: |
          echo "========== ساختار پوشه downloads/single_videos =========="
          find downloads/single_videos -type f | head -n 50
          echo "تعداد کل فایل‌ها: $(find downloads/single_videos -type f | wc -l)"
