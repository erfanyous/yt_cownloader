name: List Channel Videos

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: 'آدرس کانال یوتیوب (مثلاً https://www.youtube.com/@Google)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  list-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip curl jq

      - name: Install latest yt-dlp
        run: pip3 install --break-system-packages "yt-dlp[default]"

      - name: Extract video list and generate tree
        run: |
          python3 << 'PYEOF'
          import os, sys, json, subprocess

          channel_url = "${{ github.event.inputs.channel_url }}"

          print(">> دریافت لیست ویدیوهای کانال...")
          cmd = ["yt-dlp", "--flat-playlist", "--dump-json", channel_url]
          try:
              result = subprocess.run(cmd, capture_output=True, text=True, check=True)
              videos = [json.loads(line) for line in result.stdout.splitlines() if line.strip()]
          except Exception as e:
              print(f"خطا در دریافت لیست: {e}")
              sys.exit(1)

          if not videos:
              print("هیچ ویدیویی یافت نشد.")
              sys.exit(0)

          # استخراج نام کانال از اولین ویدیو
          channel_name = videos[0].get('channel', 'Unknown Channel')
          # ایمن‌سازی نام برای فایل
          safe_channel = channel_name.replace('/', '_').replace('\\', '_').replace(':', '_')[:60]

          # سازماندهی ویدیوها در پلی‌لیست‌ها
          from collections import defaultdict
          playlists = defaultdict(list)
          no_playlist_videos = []

          for v in videos:
              title = v.get('title', 'Untitled').strip()
              if not title:
                  continue
              pl = v.get('playlist_title')
              if pl and pl != 'NA':
                  playlists[pl].append(title)
              else:
                  no_playlist_videos.append(title)

          # ساخت درخت متنی
          tree_lines = []
          tree_lines.append(f"Channel: {channel_name}")
          tree_lines.append("=" * 50)

          for pl_name, pl_videos in sorted(playlists.items()):
              tree_lines.append(f"\n📁 Playlist: {pl_name}")
              for v in pl_videos:
                  tree_lines.append(f"   ├── {v}")
              # آخرین آیتم را به └── تغییر می‌دهیم (اختیاری)
              # برای سادگی فعلاً همه ├── می‌گذاریم (می‌توان بعداً اصلاح کرد)

          if no_playlist_videos:
              tree_lines.append(f"\n📁 No Playlist")
              for v in no_playlist_videos:
                  tree_lines.append(f"   ├── {v}")

          tree_content = "\n".join(tree_lines)

          # ذخیره در پوشه channel_lists
          os.makedirs("channel_lists", exist_ok=True)
          filename = f"channel_lists/{safe_channel}_video_list.txt"
          with open(filename, 'w', encoding='utf-8') as f:
              f.write(tree_content)

          print(f"لیست در فایل {filename} ذخیره شد.")
          print(f"تعداد کل ویدیوها: {len(videos)}")
          print("پایان.")
          PYEOF
        shell: bash

      - name: Commit and push list file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add channel_lists/

          if git diff --cached --quiet; then
            echo "هیچ تغییری برای commit وجود ندارد."
            exit 0
          fi

          git commit -m "Add channel video list for ${{ github.event.inputs.channel_url }}"

          if ! git push origin HEAD:${{ github.ref_name }}; then
            echo "Push اولیه ناموفق، تلاش مجدد با rebase..."
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
        shell: bash

      - name: Show saved list
        run: |
          echo "========== محتوای فایل لیست =========="
          find channel_lists -type f -name "*.txt" | while read f; do
            echo "--- $f ---"
            cat "$f"
          done
