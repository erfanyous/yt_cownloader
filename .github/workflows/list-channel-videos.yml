name: List Channel Videos (Full Playlist Tree)

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: 'آدرس کانال یوتیوب (مثلاً https://www.youtube.com/@Google)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  list-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip curl jq || true

      - name: Install latest yt-dlp
        run: pip3 install --break-system-packages "yt-dlp[default]" || true

      - name: Extract full playlist tree
        run: |
          set +e
          python3 << 'PYEOF'
          import os, json, subprocess

          raw_url = """${{ github.event.inputs.channel_url }}""".strip()
          os.makedirs("channel_lists", exist_ok=True)

          if not raw_url:
              with open("channel_lists/EMPTY_INPUT.txt", "w", encoding="utf-8") as f:
                  f.write("No channel URL was provided.")
              sys.exit(0)

          channel_url = raw_url.rstrip('/')

          def safe_run(args, label=""):
              try:
                  res = subprocess.run(args, capture_output=True, text=True, timeout=120)
                  if res.returncode != 0:
                      print(f"  ⚠️ {label} failed (code {res.returncode}): {res.stderr.strip()[-150:]}")
                      return None
                  return [json.loads(l) for l in res.stdout.splitlines() if l.strip()]
              except Exception as e:
                  print(f"  ⚠️ {label} exception: {e}")
                  return None

          # 1. دریافت پلی‌لیست‌ها
          print(">> Fetching playlists...")
          playlists = safe_run(["yt-dlp", "--flat-playlist", "--dump-json", f"{channel_url}/playlists"], "playlists")
          playlists = playlists if playlists else []

          # 2. حدس نام کانال
          channel_name = "Unknown Channel"
          if playlists:
              channel_name = playlists[0].get('channel', channel_name)
          else:
              probe = safe_run(["yt-dlp", "--flat-playlist", "--dump-json", channel_url], "channel probe")
              if probe and probe[0].get('channel'):
                  channel_name = probe[0]['channel']

          tree = [f"Channel: {channel_name}", "=" * 60]
          in_playlist = set()

          # 3. پردازش پلی‌لیست‌ها
          for pl in playlists:
              pl_url = pl.get('url')
              pl_title = pl.get('title', 'Unnamed').replace('/', '_')
              if not pl_url:
                  continue
              print(f"  📥 Processing playlist: {pl_title}")
              vids = safe_run(["yt-dlp", "--flat-playlist", "--dump-json", pl_url], pl_title)
              if vids is None:
                  tree.append(f"\n📁 Playlist: {pl_title} (unavailable)")
                  continue
              if not vids:
                  tree.append(f"\n📁 Playlist: {pl_title} (empty)")
                  continue
              tree.append(f"\n📁 Playlist: {pl_title} ({len(vids)} videos)")
              for i, v in enumerate(vids):
                  if v.get('id'): in_playlist.add(v['id'])
                  # ساخت عنوان کامل با برچسب Short در صورت کوتاه بودن
                  title = v.get('title', 'Untitled').strip()
                  duration = v.get('duration')
                  if duration is not None and duration <= 60:
                      title += " (Short)"
                  prefix = "   └──" if i == len(vids)-1 else "   ├──"
                  tree.append(f"{prefix} {title}")

          # 4. ویدیوهای بدون پلی‌لیست
          print(">> Fetching non-playlisted videos...")
          all_vids = safe_run(["yt-dlp", "--flat-playlist", "--dump-json", channel_url], "channel")
          unplaylisted = []
          if all_vids:
              for v in all_vids:
                  if v.get('id') and v['id'] not in in_playlist:
                      unplaylisted.append(v)
          if unplaylisted:
              tree.append(f"\n📁 No Playlist ({len(unplaylisted)} videos)")
              for i, v in enumerate(unplaylisted):
                  title = v.get('title', 'Untitled').strip()
                  duration = v.get('duration')
                  if duration is not None and duration <= 60:
                      title += " (Short)"
                  prefix = "   └──" if i == len(unplaylisted)-1 else "   ├──"
                  tree.append(f"{prefix} {title}")

          if not playlists and not all_vids:
              tree.append("\n⚠️ Could not retrieve any video data for this channel.")

          # 5. ذخیره فایل
          safe_name = channel_name.replace('/', '_')[:60]
          filepath = f"channel_lists/{safe_name}_full_tree.txt"
          with open(filepath, "w", encoding="utf-8") as f:
              f.write("\n".join(tree))
          print(f"\n✅ File saved: {filepath}")
          PYEOF
        shell: bash

      - name: Commit and push list file
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channel_lists/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update channel video list"
          if ! git push origin HEAD:${{ github.ref_name }}; then
            echo "Push failed, attempting rebase..."
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
        shell: bash

      - name: Show final tree
        run: |
          echo "========== FINAL TREE =========="
          find channel_lists -type f -name "*.txt" | while read f; do
            echo "--- $f ---"
            cat "$f"
          done
