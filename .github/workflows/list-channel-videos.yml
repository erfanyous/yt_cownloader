name: List Channel Videos (Full Playlist Tree)

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: 'آدرس کانال یوتیوب (مثلاً https://www.youtube.com/@Google)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  list-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip curl jq || true

      - name: Install latest yt-dlp
        run: pip3 install --break-system-packages "yt-dlp[default]" || true

      - name: Extract full playlist tree as Markdown
        run: |
          set +e
          python3 << 'PYEOF'
          import os, sys, json, subprocess, traceback

          try:
              raw_url = """${{ github.event.inputs.channel_url }}""".strip()
              os.makedirs("channel_lists", exist_ok=True)

              if not raw_url:
                  with open("channel_lists/EMPTY_INPUT.md", "w", encoding="utf-8") as f:
                      f.write("# ⚠️ No channel URL provided.")
                  sys.exit(0)

              channel_url = raw_url.rstrip('/')

              def safe_run(args, label="", full_info=False):
                  """
                  اجرای یک دستور yt-dlp.
                  اگر full_info=True باشد، دیگر از flat-playlist استفاده نمی‌کند.
                  """
                  try:
                      res = subprocess.run(args, capture_output=True, text=True, timeout=300)
                      if res.returncode != 0:
                          print(f"  ⚠️ {label} failed (code {res.returncode}): {res.stderr.strip()[-150:]}")
                          return None
                      return [json.loads(l) for l in res.stdout.splitlines() if l.strip()]
                  except Exception as e:
                      print(f"  ⚠️ {label} exception: {e}")
                      return None

              print(">> Fetching playlists...")
              playlists = safe_run(["yt-dlp", "--flat-playlist", "--dump-json", f"{channel_url}/playlists"], "playlists")
              playlists = playlists if playlists else []

              channel_name = "Unknown Channel"
              if playlists:
                  channel_name = playlists[0].get('channel', channel_name)
              else:
                  probe = safe_run(["yt-dlp", "--flat-playlist", "--dump-json", channel_url], "channel probe")
                  if probe and probe[0].get('channel'):
                      channel_name = probe[0]['channel']

              md_lines = []
              md_lines.append(f"# 📺 {channel_name}\n")
              md_lines.append("---")

              in_playlist_ids = set()

              def add_video_md(video, indent="  "):
                  title = video.get('title', 'Untitled').strip()
                  duration = video.get('duration')
                  if duration is not None and duration <= 60:
                      title += " 📱(Short)"

                  video_id = video.get('id')
                  video_url = video.get('url')
                  if not video_url and video_id:
                      video_url = f"https://www.youtube.com/watch?v={video_id}"

                  thumbnail_url = f"https://img.youtube.com/vi/{video_id}/maxresdefault.jpg" if video_id else ""
                  description = video.get('description', '')  # اکنون موجود است

                  md_lines.append(f"{indent}- 🎬 **{title}**")
                  if video_url:
                      md_lines.append(f"{indent}    🔗 [Watch on YouTube]({video_url})")
                  if thumbnail_url:
                      md_lines.append(f"{indent}    ![Thumbnail]({thumbnail_url})")
                  # توضیحات در یک بلوک جمع‌شونده
                  if description:
                      # حذف خطوط خالی اضافی و محدود کردن طول (اختیاری)
                      desc_clean = description.strip().replace('\n', '\\\n')  # شکستن خط در markdown
                      md_lines.append(f"{indent}    <details>")
                      md_lines.append(f"{indent}    <summary>📝 Description</summary>")
                      md_lines.append(f"{indent}    \n{desc_clean}\n")
                      md_lines.append(f"{indent}    </details>")
                  # جداکننده ملایم بین ویدیوها (فقط در انتهای هر ویدیو)
                  md_lines.append(f"")

              # 3. پردازش هر پلی‌لیست (اکنون با دانلود اطلاعات کامل)
              for pl in playlists:
                  pl_url = pl.get('url')
                  pl_title = pl.get('title', 'Unnamed').replace('/', '_')
                  if not pl_url:
                      continue
                  print(f"  📥 Processing playlist: {pl_title} (full info)")
                  # استفاده از full dump بدون flat-playlist
                  vids = safe_run(["yt-dlp", "--dump-json", pl_url], pl_title)
                  if vids is None:
                      md_lines.append(f"\n## 📁 {pl_title} (⚠️ unavailable)\n")
                      continue
                  if not vids:
                      md_lines.append(f"\n## 📁 {pl_title} (empty)\n")
                      continue

                  md_lines.append(f"\n## 📁 {pl_title} ({len(vids)} videos)\n")
                  for v in vids:
                      if v.get('id'): in_playlist_ids.add(v['id'])
                      add_video_md(v, indent="  ")

              # 4. ویدیوهای بدون پلی‌لیست (همچنان با اطلاعات کامل)
              print(">> Fetching non-playlisted videos (full info)...")
              all_vids = safe_run(["yt-dlp", "--dump-json", channel_url], "channel")
              unplaylisted = []
              if all_vids:
                  for v in all_vids:
                      if v.get('id') and v['id'] not in in_playlist_ids:
                          unplaylisted.append(v)
              if unplaylisted:
                  md_lines.append(f"\n## 📁 No Playlist ({len(unplaylisted)} videos)\n")
                  for v in unplaylisted:
                      add_video_md(v, indent="  ")

              if not playlists and not all_vids:
                  md_lines.append("\n⚠️ Could not retrieve any video data for this channel.\n")

              # 5. ذخیره Markdown
              safe_name = channel_name.replace('/', '_')[:60]
              filepath = f"channel_lists/{safe_name}_full_tree.md"
              with open(filepath, "w", encoding="utf-8") as f:
                  f.write("\n".join(md_lines))
              print(f"\n✅ Markdown file saved: {filepath}")

          except Exception as e:
              error_msg = f"# ❌ Unexpected Error\n\n```\n{traceback.format_exc()}\n```"
              with open("channel_lists/ERROR_UNEXPECTED.md", "w", encoding="utf-8") as f:
                  f.write(error_msg)
              print(f"Unexpected error: {traceback.format_exc()}")
          finally:
              sys.exit(0)
          PYEOF
        shell: bash

      - name: Commit and push list file
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channel_lists/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update channel video list (Markdown with descriptions)"
          if ! git push origin HEAD:${{ github.ref_name }}; then
            echo "Push failed, attempting rebase..."
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
        shell: bash

      - name: Show final Markdown (excerpt)
        run: |
          echo "========== FINAL MARKDOWN =========="
          find channel_lists -type f -name "*.md" | while read f; do
            echo "--- $f (first 30 lines) ---"
            head -n 30 "$f"
          done
