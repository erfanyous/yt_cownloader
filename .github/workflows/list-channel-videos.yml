name: List Channel Videos (Full Playlist Tree)

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: 'آدرس کانال یوتیوب (مثلاً https://www.youtube.com/@Google)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  list-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip curl jq

      - name: Install latest yt-dlp
        run: pip3 install --break-system-packages "yt-dlp[default]"

      - name: Extract full playlist tree
        run: |
          python3 << 'PYEOF'
          import os, sys, json, subprocess
          from collections import defaultdict

          channel_url = "${{ github.event.inputs.channel_url }}"
          if not channel_url:
              print("لینک کانال خالی است.")
              sys.exit(1)

          print(">> دریافت لیست پلی‌لیست‌های کانال...")
          try:
              # گرفتن لیست تمام پلی‌لیست‌ها از برگه Playlists
              playlists_cmd = ["yt-dlp", "--flat-playlist", "--dump-json",
                               f"{channel_url}/playlists"]
              res = subprocess.run(playlists_cmd, capture_output=True, text=True, check=True)
              playlists_info = [json.loads(line) for line in res.stdout.splitlines() if line.strip()]
          except Exception as e:
              print(f"خطا در دریافت پلی‌لیست‌ها: {e}")
              sys.exit(1)

          print(f">> {len(playlists_info)} پلی‌لیست پیدا شد.")

          # استخراج نام کانال از اولین پلی‌لیست (در صورت وجود)
          channel_name = "Unknown Channel"
          if playlists_info:
              channel_name = playlists_info[0].get('channel', channel_name)

          # ساخت ساختار درختی
          tree_lines = []
          tree_lines.append(f"Channel: {channel_name}")
          tree_lines.append("=" * 60)

          # نگهداری مجموعه‌ای از ID ویدیوهایی که در پلی‌لیست‌ها قرار می‌گیرند
          in_playlist_ids = set()

          # 1. پردازش هر پلی‌لیست
          for pl in playlists_info:
              pl_url = pl.get('url')
              pl_title = pl.get('title', 'بدون نام').replace('/', '_')
              if not pl_url:
                  continue

              print(f"  📥 دریافت ویدیوهای پلی‌لیست: {pl_title}")
              try:
                  videos_cmd = ["yt-dlp", "--flat-playlist", "--dump-json", pl_url]
                  vres = subprocess.run(videos_cmd, capture_output=True, text=True, check=True)
                  videos = [json.loads(line) for line in vres.stdout.splitlines() if line.strip()]
              except Exception:
                  print(f"    ⚠️ خطا در دریافت ویدیوهای '{pl_title}' – نادیده گرفته شد.")
                  continue

              if not videos:
                  tree_lines.append(f"\n📁 Playlist: {pl_title} (خالی)")
                  continue

              tree_lines.append(f"\n📁 Playlist: {pl_title} ({len(videos)} ویدیو)")
              for i, v in enumerate(videos):
                  vid_id = v.get('id')
                  if vid_id:
                      in_playlist_ids.add(vid_id)
                  title = v.get('title', 'Untitled').strip()
                  prefix = "   └──" if i == len(videos) - 1 else "   ├──"
                  tree_lines.append(f"{prefix} {title}")

          # 2. ویدیوهای بدون پلی‌لیست (از برگه Videos کانال)
          print(">> دریافت ویدیوهای بدون پلی‌لیست...")
          try:
              all_cmd = ["yt-dlp", "--flat-playlist", "--dump-json", channel_url]
              all_res = subprocess.run(all_cmd, capture_output=True, text=True, check=True)
              all_videos = [json.loads(line) for line in all_res.stdout.splitlines() if line.strip()]
          except Exception:
              all_videos = []

          unplaylisted = []
          for v in all_videos:
              vid_id = v.get('id')
              if vid_id and vid_id not in in_playlist_ids:
                  unplaylisted.append(v)

          if unplaylisted:
              tree_lines.append(f"\n📁 No Playlist ({len(unplaylisted)} ویدیو)")
              for i, v in enumerate(unplaylisted):
                  title = v.get('title', 'Untitled').strip()
                  prefix = "   └──" if i == len(unplaylisted) - 1 else "   ├──"
                  tree_lines.append(f"{prefix} {title}")

          # ذخیره در فایل
          safe_channel = channel_name.replace('/', '_')[:60]
          os.makedirs("channel_lists", exist_ok=True)
          filename = f"channel_lists/{safe_channel}_full_tree.txt"
          with open(filename, 'w', encoding='utf-8') as f:
              f.write("\n".join(tree_lines))

          print(f"\n✅ فایل '{filename}' ذخیره شد.")
          print(f"تعداد کل ویدیوها: {len(in_playlist_ids) + len(unplaylisted)}")
          PYEOF
        shell: bash

      - name: Commit and push list file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add channel_lists/

          if git diff --cached --quiet; then
            echo "هیچ تغییری برای commit وجود ندارد."
            exit 0
          fi

          git commit -m "Add full playlist tree for ${{ github.event.inputs.channel_url }}"

          if ! git push origin HEAD:${{ github.ref_name }}; then
            echo "Push اولیه ناموفق، تلاش مجدد با rebase..."
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
        shell: bash

      - name: Show final tree
        run: |
          echo "========== درخت نمایشی =========="
          find channel_lists -type f -name "*_full_tree.txt" | while read f; do
            echo "--- $f ---"
            cat "$f"
          done
